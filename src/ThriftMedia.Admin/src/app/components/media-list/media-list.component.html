<div class="container">
  <div class="row">
    <div class="col-md-12">
      <h1>Media Management</h1>
      <p class="lead">Upload and manage media items</p>

      <div class="card mt-4">
        <div class="card-header">
          <button class="btn btn-primary">Upload Media</button>
        </div>
        <div class="card-body">
          <div
            *ngIf="mediaItems.length === 0"
            class="text-center text-muted py-5"
          >
            <p>No media items yet. Upload your first item to get started!</p>
          </div>
          <div *ngIf="mediaItems.length > 0">
            <table class="table table-striped">
              <thead>
                <tr>
                  <th>Image</th>
                  <th>Type</th>
                  <th>Status</th>
                  <th>Created</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let item of mediaItems">
                  <td>{{ item.id }}</td>
                  <td>{{ item.type }}</td>
                  <td>{{ item.status }}</td>
                  <td>{{ item.created }}</td>
                  <td>
                    <button class="btn btn-sm btn-info">View</button>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
